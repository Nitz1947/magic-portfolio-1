<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="120" y="100" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="white">Microservices API</text>
  <text x="120" y="135" font-family="system-ui,sans-serif" font-size="16" fill="rgba(255,255,255,0.5)">Node.js · REST · Docker</text>
  <!-- Service nodes -->
  <rect x="200" y="200" width="200" height="100" rx="14" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="2"/>
  <text x="300" y="245" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="#22d3ee" text-anchor="middle">Gateway</text>
  <text x="300" y="275" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">API Router</text>
  <rect x="500" y="160" width="180" height="90" rx="12" fill="rgba(99,102,241,0.2)" stroke="#6366f1"/>
  <text x="590" y="205" font-family="system-ui,sans-serif" font-size="14" fill="#a5b4fc" text-anchor="middle">Orders</text>
  <rect x="500" y="280" width="180" height="90" rx="12" fill="rgba(99,102,241,0.15)" stroke="#6366f1"/>
  <text x="590" y="325" font-family="system-ui,sans-serif" font-size="14" fill="#a5b4fc" text-anchor="middle">Payments</text>
  <rect x="500" y="400" width="180" height="90" rx="12" fill="rgba(99,102,241,0.15)" stroke="#6366f1"/>
  <text x="590" y="445" font-family="system-ui,sans-serif" font-size="14" fill="#a5b4fc" text-anchor="middle">Users</text>
  <path d="M400 250 H500" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <path d="M400 250 L500 205" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <path d="M400 250 L500 325" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <path d="M400 250 L500 445" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <rect x="780" y="200" width="200" height="100" rx="14" fill="rgba(251,191,36,0.12)" stroke="#fbbf24"/>
  <text x="880" y="255" font-family="system-ui,sans-serif" font-size="14" fill="#fbbf24" text-anchor="middle">PostgreSQL</text>
  <rect x="780" y="340" width="200" height="100" rx="14" fill="rgba(239,68,68,0.12)" stroke="#ef4444"/>
  <text x="880" y="395" font-family="system-ui,sans-serif" font-size="14" fill="#f87171" text-anchor="middle">Redis Cache</text>
  <path d="M680 205 H780" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <path d="M680 325 H780" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <!-- Terminal -->
  <rect x="200" y="520" width="780" height="280" rx="16" fill="#0f172a" stroke="rgba(255,255,255,0.1)"/>
  <rect x="200" y="520" width="780" height="36" rx="16" fill="#1e293b"/>
  <text x="230" y="543" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">terminal — docker compose up</text>
  <text x="230" y="590" font-family="monospace" font-size="14" fill="#22c55e">✓ gateway     running  0.0.0.0:3000</text>
  <text x="230" y="620" font-family="monospace" font-size="14" fill="#22c55e">✓ orders-svc  running  internal:4001</text>
  <text x="230" y="650" font-family="monospace" font-size="14" fill="#22c55e">✓ payments    running  internal:4002</text>
  <text x="230" y="680" font-family="monospace" font-size="14" fill="#22d3ee">→ GET /api/v1/orders  200  42ms</text>
  <text x="230" y="710" font-family="monospace" font-size="14" fill="#22d3ee">→ POST /api/v1/pay   201  128ms</text>
  <rect x="1020" y="520" width="500" height="280" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
  <text x="1060" y="560" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="white">Metrics</text>
  <text x="1060" y="610" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">p99 latency</text>
  <text x="1060" y="650" font-family="system-ui,sans-serif" font-size="32" font-weight="700" fill="#22d3ee">48ms</text>
  <text x="1060" y="690" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">Requests/min</text>
  <text x="1060" y="730" font-family="system-ui,sans-serif" font-size="32" font-weight="700" fill="white">2.4k</text>
</svg>
