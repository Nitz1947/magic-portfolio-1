<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="200" cy="150" r="100" fill="#6366f1" opacity="0.2"/>
  <circle cx="1400" cy="750" r="140" fill="#22d3ee" opacity="0.15"/>
  <!-- Browser frame -->
  <rect x="180" y="100" width="1140" height="700" rx="16" fill="url(#panel)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  <rect x="180" y="100" width="1140" height="48" rx="16" fill="#334155"/>
  <rect x="180" y="132" width="1140" height="20" fill="#334155"/>
  <circle cx="210" cy="124" r="8" fill="#ef4444"/>
  <circle cx="238" cy="124" r="8" fill="#f59e0b"/>
  <circle cx="266" cy="124" r="8" fill="#22c55e"/>
  <rect x="500" y="112" width="520" height="24" rx="12" fill="#1e293b"/>
  <text x="760" y="128" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">myaac.community-server.ot</text>
  <!-- Sidebar -->
  <rect x="200" y="168" width="220" height="612" fill="rgba(0,0,0,0.25)"/>
  <rect x="220" y="200" width="80" height="10" rx="4" fill="#6366f1"/>
  <rect x="220" y="230" width="160" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="220" y="260" width="140" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="220" y="300" width="160" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
  <rect x="220" y="330" width="120" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>
  <!-- Main: game stats dashboard -->
  <rect x="440" y="188" width="320" height="180" rx="12" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.4)"/>
  <text x="460" y="220" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">Server Status</text>
  <text x="460" y="280" font-family="system-ui,sans-serif" font-size="36" font-weight="700" fill="#a5b4fc" filter="url(#glow)">Online</text>
  <rect x="460" y="300" width="200" height="8" rx="4" fill="rgba(165,180,252,0.3)"/>
  <rect x="760" y="188" width="320" height="180" rx="12" fill="rgba(34,211,238,0.12)" stroke="rgba(34,211,238,0.3)"/>
  <text x="780" y="220" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">Integracje</text>
  <text x="780" y="280" font-family="system-ui,sans-serif" font-size="32" font-weight="700" fill="#22d3ee">Sync</text>
  <rect x="1080" y="188" width="140" height="180" rx="12" fill="rgba(255,255,255,0.06)"/>
  <text x="1100" y="220" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">TFS</text>
  <text x="1100" y="260" font-family="system-ui,sans-serif" font-size="22" font-weight="600" fill="white">1.5+</text>
  <text x="1100" y="290" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">Lua scripts</text>
  <!-- Ranking table -->
  <rect x="440" y="410" width="660" height="280" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
  <text x="460" y="445" font-family="system-ui,sans-serif" font-size="16" font-weight="600" fill="white">Highscores  myAAC</text>
  <rect x="460" y="460" width="620" height="36" rx="6" fill="rgba(99,102,241,0.15)"/>
  <text x="480" y="483" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.7)">#1  DragonSlayer   Lv 412</text>
  <rect x="460" y="504" width="620" height="32" rx="6" fill="rgba(255,255,255,0.04)"/>
  <text x="480" y="525" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.55)">#2  MysticKnight   Lv 398</text>
  <rect x="460" y="540" width="620" height="32" rx="6" fill="rgba(255,255,255,0.04)"/>
  <text x="480" y="561" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.55)">#3  ShadowHunter   Lv 385</text>
  <!-- Lua code panel -->
  <rect x="1120" y="410" width="140" height="280" rx="12" fill="#0f172a" stroke="rgba(34,211,238,0.3)"/>
  <text x="1135" y="440" font-family="monospace" font-size="11" fill="#22d3ee">function onUse()</text>
  <text x="1135" y="458" font-family="monospace" font-size="11" fill="#a5b4fc">  player:addItem()</text>
  <text x="1135" y="476" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.5)">  return true</text>
  <text x="1135" y="494" font-family="monospace" font-size="11" fill="#22d3ee">end</text>
  <text x="800" y="860" font-family="system-ui,sans-serif" font-size="28" font-weight="600" fill="rgba(255,255,255,0.25)" text-anchor="middle">TFS + myAAC Community Platform</text>
</svg>
